[platformio]
default_envs = nano, uno, mega, esp32, uno_r4_wifi

[common]
framework = arduino
monitor_speed = 115200

[env:nano]
platform = atmelavr
board = nanoatmega328
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = 
	arduino-libraries/Servo@^1.2.2

[env:uno]
platform = atmelavr
board = uno
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = 
	arduino-libraries/Servo@^1.2.2

[env:mega]
platform = atmelavr
board = megaatmega2560
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = 
	arduino-libraries/Servo@^1.2.2

[env:esp32]
platform = espressif32
board = esp32dev
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = 
	madhephaestus/ESP32Servo@^3.0.6
	arduino-libraries/ArduinoBLE@^1.3.7

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
; Servo is usually built-in for R4 or uses the standard AVR-compatible library
lib_deps = 
	arduino-libraries/Servo@^1.2.2
	arduino-libraries/ArduinoBLE@^1.3.7
	arduino-libraries/ArduinoGraphics
